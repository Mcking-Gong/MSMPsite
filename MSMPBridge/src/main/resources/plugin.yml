name: MSMPBridge
version: '${project.version}'
main: com.msmp.bridge.MSMPBridge
api-version: '1.21.11'
description: Bridge plugin between MSMP Minecraft server and website
author: MSMP
website: https://msmp.mplusm.site

commands:
  msmp:
    description: MSMP Bridge management commands
    usage: /msmp <sync|status|reload>
    permission: msmp.admin

permissions:
  msmp.admin:
    description: Allows MSMP Bridge admin commands
    default: op
